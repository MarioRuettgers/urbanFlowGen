# Real-city geometry configuration for urbanFlowGen

[settings]
# Active city selection (key name from cities section)
# Single city: active_cities = ["Seoul"]
# Multiple cities: active_cities = ["Seoul", "NewYork_Manhattan", "Tokyo"]
active_cities = ["Incheon_Songdo"]
#active_cities = ["Seoul_Gangnam", "NewYork_Manhattan", "Busan_Haeundae", "Tokyo"]

# Data source selection
# "overture_simple" - Simple approach (OSMGenerator style)
# "overture_geopandas" - GeoDataFrame approach (AtlasGenerator style, more stable)
# "global_building_atlas" - Global Building Atlas via WFS (satellite-derived heights)
#                            Note: Server may be under maintenance. Auto-fallback to Overture Maps enabled.
#data_source = "overture_simple"
data_source = "overture_geopandas"
#data_source = "global_building_atlas"

# Circular domain radius (meters)
# This value × 2 = diameter of the urban area to collect
# Example: 500m → diameter 1000m (1km × 1km circular area)
collection_radius_meters = 200

# Building height handling when no height data available
# 0 = Exclude buildings without height data (flat ground)
# Number = Use as default height in meters (e.g., 15.0)
default_height = 2.0

# ==========================================
# Exact Location Mode (Optional)
# ==========================================
# Enable this to use a specific lat/lon instead of random sampling
use_exact_location = true

[exact_location]
# Specify exact coordinates when use_exact_location = true
# This will override random sampling from active_cities

latitude = 37.39755           
longitude = 126.641539       
# utm_zone = 52                # Optional: Auto-calculated from longitude if not provided
description = "SONGDO"

# ==========================================
# Global Building Atlas WFS Configuration
# ==========================================
[global_building_atlas]
wfs_url = "https://tubvsig-so2sat-vm1.srv.mwn.de/geoserver/ows"
# Possible layer names (check GetCapabilities for exact names):
# - gba:GBA_Polygon (CC BY-NC 4.0 polygons with height)
# - gba:GBA_ODbLPolygon (ODbL licensed polygons)
# - gba:GBA_LoD1 (LoD1 3D models)
layer_name = "gba:GBA_Polygon"
version = "2.0.0"
# CRS: Global Building Atlas uses EPSG:3857 (Web Mercator)
crs = "EPSG:3857"
# Height field names
height_field = "height"
variance_field = "var"  # Uncertainty/variance (optional)

# ==========================================
# City Presets
# ==========================================

[cities.Seoul]
name = "Seoul Metropolitan Area"
center_lat = 37.5665      # Seoul City Hall reference
center_lon = 126.9780
sampling_radius_km = 20.0  # Random sampling radius (20km)
utm_zone = 52              # UTM Zone 52N (Korea)
description = "Entire Seoul (Gangnam, Jongno, Gangbuk, Songpa, etc.)"

[cities.Seoul_Gangnam]
name = "Seoul Gangnam District"
center_lat = 37.4979      # Gangnam Station reference
