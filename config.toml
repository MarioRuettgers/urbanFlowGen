tau_re_start = 1000
Delta_tau_re = 50000
Delta_tau_s = 50000
Delta_tau_r = 50000
RESTART = false
tau_r = 300000
TIME-AVERAGING = true
tau_a_start = 300000
tau_a_stop = 350000
